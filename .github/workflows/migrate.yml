name: Database Migrations

# Manual trigger only. Database migrations are never applied automatically.
# This is intentional for a regulated AML/KYC product — every schema change
# must be explicitly triggered and reviewed by a human operator.
#
# Usage:
#   GitHub → Actions → Database Migrations → Run workflow
#   Select environment, choose dry-run first, then apply.
#
# Required GitHub secrets (set per environment):
#   SUPABASE_ACCESS_TOKEN     — Supabase personal access token (supabase.com → Account)
#   SUPABASE_DB_PASSWORD      — Database password for the target project
#   SUPABASE_PROJECT_REF      — Project reference ID (e.g. zjcxxxwtsbpyphhevlrb)
#
# For production: configure a GitHub Environment named "production" with
#   required reviewers to enforce approval before migrations apply.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: choice
        options:
          - staging
          - production
        default: staging
      dry_run:
        description: Dry run — show pending migrations without applying
        type: boolean
        default: true

env:
  # actions/checkout@v4 runs its internal JavaScript on Node.js 20 (deprecated).
  # Force Node.js 24 runtime for all JavaScript actions until v5 is available.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  migrate:
    name: ${{ inputs.dry_run == true && 'Dry Run' || 'Apply' }} → ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}  # Triggers GitHub Environment protection rules

    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Show pending migrations (always runs)
        run: supabase migration list
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Apply migrations (dry run)
        if: inputs.dry_run == true
        run: |
          echo "DRY RUN — no changes applied."
          supabase db push --dry-run
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Apply migrations (live)
        if: inputs.dry_run == false
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Verify migration state
        if: inputs.dry_run == false
        run: supabase migration list
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
