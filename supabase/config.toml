# Supabase local development configuration.
# Docs: https://supabase.com/docs/guides/cli/config
#
# This file configures the LOCAL Supabase stack only.
# Remote project: zjcxxxwtsbpyphhevlrb (linked via `supabase link`)
# Remote settings are managed in Supabase Dashboard + applied via migrations.

project_id = "aml-kyc-cdd-portal"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true
ip_version = "IPv6"
max_header_length = 4096

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

# Local email testing — all sent emails are captured at http://localhost:54324
[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
# Must match NEXT_PUBLIC_APP_URL in .env.local so OAuth/magic-link callbacks work.
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["http://localhost:3000"]
# JWT expiry in seconds (1 hour). Middleware refreshes before expiry on each request.
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
# Disabled — users are provisioned only via the invitation flow (inviteUserByEmail).
# Direct self-signup is not permitted in this platform.
enable_signup = false
enable_anonymous_sign_ins = false
minimum_password_length = 12
password_requirements = "lower_upper_letters_digits"

[auth.email]
enable_signup = true
double_confirm_changes = true
# Confirmations disabled locally — invitation emails go to Inbucket (http://localhost:54324).
# Enable in remote projects via Supabase Dashboard → Auth → Email → Confirm email.
enable_confirmations = false
secure_password_change = true
max_frequency = "1s"

[auth.hook.custom_access_token]
enabled = true
uri = "pg-functions://postgres/public/custom_access_token_hook"

[auth.mfa]
max_enrolled_factors = 5

# TOTP MFA — required for MLRO, TENANT_ADMIN, PLATFORM_SUPER_ADMIN roles.
# See lib/constants/roles.ts: MFA_REQUIRED_ROLES
[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.mfa.phone]
enroll_enabled = false
verify_enabled = false

# Custom Access Token Hook — enriches JWTs with tenant_id, user_role, permissions.
# See migration 0005 / 0021 for the function definition.
[auth.hook.custom_access_token]
enabled = true
uri = "pg-functions://postgres/public/custom_access_token_hook"

# ─────────────────────────────────────────────────────────────────────────────
# Edge Functions
#
# verify_jwt = false on the three webhook processors below: they are invoked by
# pg_cron via service-role JWT (see migration 0028 header for the schedule
# command). Their logic enforces auth via service-role database access only.
# ─────────────────────────────────────────────────────────────────────────────

[functions.process-screening-webhook]
enabled = true
verify_jwt = false

[functions.process-idv-webhook]
enabled = true
verify_jwt = false

[functions.retry-failed-webhooks]
enabled = true
verify_jwt = false

# compute-document-hash is invoked from confirmUpload() via service-role JWT;
# verify_jwt remains true (default) because invocation goes through the standard
# Supabase functions auth path with the service-role bearer token.
[functions.compute-document-hash]
enabled = true
